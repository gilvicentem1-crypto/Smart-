<html lang="pt">

<meta charset="UTF-8" />

<link rel="apple-touch-icon" href="icon-192.svg" />

<style>
  :root{
    --bg:#F2F7FC; --card:#FFFFFF; --blue:#0077D4; --blue-deep:#00579B;
    --blue-tint:#A1BEE4; --blue-pale:#EAF3FB; --ink:#14202B; --muted:#5B6B7A;
    --green:#2E7D32; --red:#C0392B; --amber:#B7791F; --border:#0077D41A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
  h1,h2,.serif{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;background:#0077D4f2;border-bottom:1px solid #FFFFFF33;backdrop-filter:blur(6px);}
  .logo{display:flex;align-items:center;gap:8px;font-weight:600;color:#fff;font-size:1.05rem;}
  nav.desktop{display:none;gap:2px;}
  @media(min-width:820px){ nav.desktop{display:flex;} .mobile-toggle{display:none;} }
  nav.desktop button{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;font-size:.9rem;
    font-weight:500;background:transparent;color:#D6E9FB;border:none;cursor:pointer;transition:.15s;}
  nav.desktop button.active{background:#FFFFFF33;color:#fff;}
  .mobile-toggle{background:none;border:none;font-size:1.4rem;color:#fff;cursor:pointer;}
  nav.mobile{display:none;flex-direction:column;background:var(--blue-deep);padding:10px 16px;gap:2px;}
  nav.mobile.open{display:flex;}
  nav.mobile button{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:none;
    background:transparent;color:#D6E9FB;font-size:.9rem;font-weight:500;text-align:left;cursor:pointer;}
  nav.mobile button.active{background:#FFFFFF33;color:#fff;}
  .lang-wrap{position:relative;}
  .lang-btn{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;font-size:.75rem;
    font-weight:700;background:#FFFFFF22;color:#fff;border:1px solid #FFFFFF55;cursor:pointer;}
  .lang-menu{display:none;position:absolute;right:0;margin-top:8px;background:#fff;border-radius:10px;
    overflow:hidden;min-width:150px;box-shadow:0 8px 24px #00000033;}
  .lang-menu.open{display:block;}
  .lang-menu button{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 14px;
    border:none;background:transparent;font-size:.9rem;text-align:left;cursor:pointer;color:var(--ink);}
  .lang-menu button.active{background:#0077D422;}
  .header-right{display:flex;align-items:center;gap:10px;}
  main{max-width:920px;margin:0 auto;padding:28px 20px 60px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
    font-weight:700;color:var(--blue);margin-bottom:8px;}
  .eyebrow.light{color:var(--blue-pale);}
  .hero{position:relative;overflow:hidden;border-radius:18px;padding:36px 28px;
    background:linear-gradient(135deg,#0077D4 0%,#00365E 75%);margin-bottom:36px;}
  .hero::after{content:"";position:absolute;right:-60px;top:-60px;width:230px;height:230px;border-radius:50%;
    background:radial-gradient(circle,#A1BEE4,transparent 70%);opacity:.35;}
  .hero h1{position:relative;color:#fff;font-size:2rem;line-height:1.2;font-weight:600;max-width:600px;}
  .hero p{position:relative;color:#DCEAFB;max-width:520px;margin-top:12px;}
  .hero .ctas{position:relative;display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;}
  .btn-primary{background:#fff;color:var(--blue);padding:12px 20px;border-radius:10px;font-weight:600;
    border:none;cursor:pointer;font-size:.9rem;}
  .btn-secondary{background:transparent;color:#fff;border:1px solid #FFFFFF66;padding:12px 20px;border-radius:10px;
    font-weight:600;cursor:pointer;font-size:.9rem;}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:36px;}
  @media(min-width:640px){ .stats{grid-template-columns:repeat(4,1fr);} }
  .stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);}
  .stat-card .icon{font-size:1.3rem;}
  .stat-card .value{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-top:6px;}
  .stat-card .label{font-size:.75rem;color:var(--muted);margin-top:4px;}
  .module-grid{display:grid;gap:14px;}
  @media(min-width:700px){ .module-grid{grid-template-columns:1fr 1fr;} }
  .module-card{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:18px;cursor:pointer;text-align:left;}
  .module-card .ic{background:#0077D41A;border-radius:10px;padding:9px 11px;font-size:1.3rem;}
  .module-card .title{font-weight:600;}
  .module-card .desc{font-size:.85rem;color:var(--muted);margin-top:4px;}
  h2.page-title{font-size:1.5rem;font-weight:600;margin:0 0 4px;}
  p.page-sub{color:var(--muted);margin:0 0 22px;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:10px 14px;margin-bottom:22px;}
  .search-box input{border:none;background:transparent;outline:none;width:100%;font-size:.9rem;color:var(--ink);font-family:inherit;}
  .grid-3{display:grid;gap:14px;}
  @media(min-width:640px){ .grid-3{grid-template-columns:1fr 1fr;} }
  @media(min-width:960px){ .grid-3{grid-template-columns:1fr 1fr 1fr;} }
  .product-card, .course-card, .alert-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .product-card .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .pname{font-family:'Fraunces',serif;font-weight:600;}
  .pill{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:99px;}
  .punit{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .pprice{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:700;margin-top:10px;}
  .pprice small{font-size:.8rem;font-weight:400;}
  .pmeta{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:10px;}
  .pbtn{margin-top:10px;width:100%;padding:9px;border-radius:9px;background:var(--blue);color:#fff;border:none;
    font-weight:600;font-size:.85rem;cursor:pointer;}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px 0;}
  .chat-wrap{display:flex;flex-direction:column;height:66vh;}
  .chat-box{flex:1;overflow-y:auto;background:var(--blue-pale);border:1px solid var(--border);border-radius:14px;
    padding:16px;display:flex;flex-direction:column;gap:10px;}
  .bubble{max-width:80%;padding:10px 14px;border-radius:10px;font-size:.9rem;white-space:pre-wrap;line-height:1.4;}
  .bubble.user{align-self:flex-end;background:var(--blue);color:#fff;}
  .bubble.bot{align-self:flex-start;background:#fff;color:var(--ink);}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .sugg{font-size:.75rem;padding:7px 12px;border-radius:99px;border:1px solid #0077D466;background:transparent;
    color:var(--blue);cursor:pointer;}
  .chat-input{display:flex;gap:8px;margin-top:12px;}
  .chat-input input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;
    font-size:.9rem;outline:none;font-family:inherit;color:var(--ink);}
  .chat-input button{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:0 16px;cursor:pointer;font-size:1.1rem;}
  .progress-txt{font-size:.85rem;color:var(--blue);margin-bottom:18px;}
  .course-card{display:flex;gap:12px;}
  .course-card .title{font-weight:600;}
  .course-card .meta{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted);margin-top:6px;}
  .weather-card{display:flex;align-items:center;gap:18px;background:#0077D414;border:1px solid #0077D444;
    border-radius:14px;padding:18px;margin-bottom:22px;}
  .weather-card .temp{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;}
  .alert-card{display:flex;gap:12px;}
  .alert-card .ic{background:#0000;border-radius:10px;padding:8px;font-size:1.2rem;}
  .alert-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .alert-meta{display:flex;gap:8px;font-size:.75rem;color:var(--muted);margin-top:4px;}
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
  .chart-card .ctitle{font-weight:600;margin-bottom:10px;}
  .dados-grid{display:grid;gap:16px;}
  @media(min-width:760px){ .dados-grid{grid-template-columns:1fr 1fr;} .dados-grid .span2{grid-column:1/-1;} }
  footer{text-align:center;font-size:.75rem;color:var(--muted);padding:30px 0;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:#0077D455;border-radius:4px;}
</style>
</head>

const PRODUCAO_VAL=[320,340,410,460,505,540], RENDA_VAL=[100,118,131], PERDAS_VAL=[100,75];

/* ======================= ESTADO ======================= */
let state = {
  lang: localStorage.getItem("agrosmart_lang") || "pt",
  page: "inicio",
  menuOpen: false,
  langMenuOpen: false,
  busca: "",
  chat: [],
  cursos: null, // preenchido por idioma na 1ª renderização
};

function t(){ return T[state.lang]; }
function setLang(l){ state.lang = l; localStorage.setItem("agrosmart_lang", l); state.langMenuOpen=false; state.chat=[]; render(); }
function setPage(p){ state.page = p; state.menuOpen=false; window.scrollTo({top:0,behavior:"smooth"}); render(); }

/* ======================= RENDER: HEADER ======================= */
function renderHeader(){
  const T_ = t();
  const ids = ["inicio",...MODULE_ORDER,"dados"];
  return `
  <header>
    <div class="logo">${MODULE_ICON.inicio} AgroSmart Connect</div>
    <nav class="desktop">
      ${ids.map(id=>`<button class="${state.page===id?'active':''}" onclick="setPage('${id}')">${MODULE_ICON[id]} ${T_.nav[id]}</button>`).join("")}
    </nav>
    <div class="header-right">
      <div class="lang-wrap">
        <button class="lang-btn" onclick="state.langMenuOpen=!state.langMenuOpen;render()">🌐 ${LANGS.find(l=>l.code===state.lang).short}</button>
        <div class="lang-menu ${state.langMenuOpen?'open':''}">
          ${LANGS.map(l=>`<button class="${l.code===state.lang?'active':''}" onclick="setLang('${l.code}')">${l.label} ${l.code===state.lang?'✓':''}</button>`).join("")}
        </div>
      </div>
      <button class="mobile-toggle" onclick="state.menuOpen=!state.menuOpen;render()">${state.menuOpen?'✕':'☰'}</button>
    </div>
  </header>
  <nav class="mobile ${state.menuOpen?'open':''}">
    ${ids.map(id=>`<button class="${state.page===id?'active':''}" onclick="setPage('${id}')">${MODULE_ICON[id]} ${T_.nav[id]}</button>`).join("")}
  </nav>`;
}

/* ======================= RENDER: PÁGINAS ======================= */
function renderInicio(){
  const T_ = t();
  return `
  <div class="hero">
    <div class="eyebrow light">${T_.hero.eyebrow}</div>
    <h1>${T_.hero.headline}</h1>
    <p>${T_.hero.sub}</p>
    <div class="ctas">
      <button class="btn-primary" onclick="setPage('mercado')">${T_.hero.ctaMercado} →</button>
      <button class="btn-secondary" onclick="setPage('assistente')">${T_.hero.ctaAssistente}</button>
    </div>
  </div>
  <div class="stats">
    ${["👥","📈","🍃","🎓"].map((ic,i)=>`
      <div class="stat-card"><div class="icon">${ic}</div>
        <div class="value">${T_.stats[i][0]}</div>
        <div class="label">${T_.stats[i][1]}</div>
      </div>`).join("")}
  </div>
  <div class="eyebrow">${T_.modulesTitle}</div>
  <div class="module-grid">
    ${T_.modules.map((m,i)=>`
      <button class="module-card" onclick="setPage('${m.id}')">
        <div class="ic">${MODULE_ICON[m.id]}</div>
        <div><div class="title">${m.titulo}</div><div class="desc">${m.desc}</div></div>
      </button>`).join("")}
  </div>`;
}

function renderMercado(){
  const T_ = t().mercado;
  const filtrados = T_.produtos.filter(p=>p.nome.toLowerCase().includes(state.busca.toLowerCase()));
  return `
  <div class="eyebrow">${T_.eyebrow}</div>
  <h2 class="page-title">${T_.titulo}</h2>
  <p class="page-sub">${T_.sub}</p>
  <div class="search-box">🔍 <input id="busca-input" placeholder="${T_.buscaPlaceholder}" value="${state.busca}" oninput="state.busca=this.value;render();setTimeout(()=>{const el=document.getElementById('busca-input');if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length;}},0)" /></div>
  <div class="grid-3">
    ${filtrados.map(p=>`
      <div class="product-card">
        <div class="top"><div class="pname">${p.nome}</div>
          <span class="pill" style="background:${p.variacao>=0?'#2E7D3222':'#C0392B22'};color:${p.variacao>=0?'#2E7D32':'#C0392B'}">${p.variacao>=0?'▲':'▼'} ${Math.abs(p.variacao)}%</span>
        </div>
        <div class="punit">${p.unidade}</div>
        <div class="pprice">${p.preco.toLocaleString('pt-PT')} <small>MT</small></div>
        <div class="pmeta"><span>📍 ${p.regiao}</span><span>${T_.estoqueLabel}: ${T_.niveis[p.estoque]}</span></div>
        <button class="pbtn">${T_.contactar}</button>
      </div>`).join("") || `<div class="empty">${T_.semResultados(state.busca)}</div>`}
  </div>`;
}

function findTip(query){
  const T_ = t().assistente;
  const q = query.toLowerCase();
  for(const tip of T_.tips){ if(tip.kw.some(k=>q.includes(k))) return tip.r; }
  return T_.fallback;
}

function renderAssistente(){
  const T_ = t().assistente;
  if(state.chat.length===0) state.chat=[{role:"bot",text:T_.welcome}];
  return `
  <div class="eyebrow">${T_.eyebrow}</div>
  <h2 class="page-title">${T_.titulo}</h2>
  <p class="page-sub">${T_.sub}</p>
  <div class="chat-wrap">
    <div class="chat-box" id="chat-box">
      ${state.chat.map(m=>`<div class="bubble ${m.role==='user'?'user':'bot'}">${m.text}</div>`).join("")}
    </div>
    ${state.chat.length<2?`<div class="suggestions">${T_.sugestoes.map(s=>`<button class="sugg" onclick="sendChat('${s.replace(/'/g,"\\'")}')">${s}</button>`).join("")}</div>`:""}
    <div class="chat-input">
      <input id="chat-input" placeholder="${T_.inputPlaceholder}" onkeydown="if(event.key==='Enter')sendChat(this.value)" />
      <button onclick="sendChat(document.getElementById('chat-input').value)">➤</button>
    </div>
  </div>`;
}
function sendChat(text){
  text = (text||"").trim();
  if(!text) return;
  state.chat.push({role:"user",text});
  state.chat.push({role:"bot",text:findTip(text)});
  render();
  const box=document.getElementById('chat-box');
  if(box) box.scrollTop = box.scrollHeight;
  const input=document.getElementById('chat-input');
  if(input) input.value="";
}

function renderFormacao(){
  const T_ = t().formacao;
  const done = T_.cursos.filter(c=>c.concluido).length;
  const corNivel = {Iniciante:"#2E7D32",Intermédio:"#B7791F",Avançado:"#C0392B"};
  return `
  <div class="eyebrow">${T_.eyebrow}</div>
  <h2 class="page-title">${T_.titulo}</h2>
  <p class="page-sub" style="margin-bottom:6px">${T_.sub}</p>
  <div class="progress-txt">${T_.progresso(done,T_.cursos.length)}</div>
  <div class="grid-3" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">
    ${T_.cursos.map(c=>`
      <div class="course-card">
        <div>${c.concluido?'✅':'▶️'}</div>
        <div><div class="title">${c.titulo}</div>
          <div class="meta"><span>${c.duracao}</span><span>·</span>
          <span class="pill" style="background:${corNivel[c.nivel]}22;color:${corNivel[c.nivel]}">${T_.niveis[c.nivel]}</span></div>
        </div>
      </div>`).join("")}
  </div>`;
}

function renderAlertas(){
  const T_ = t().alertas;
  return `
  <div class="eyebrow">${T_.eyebrow}</div>
  <h2 class="page-title">${T_.titulo}</h2>
  <p class="page-sub">${T_.sub}</p>
  <div class="weather-card">☀️ <div><div class="temp">29°C</div><div style="color:var(--muted);font-size:.85rem">Maputo · ${T_.clima}</div></div></div>
  <div class="grid-3" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">
    ${T_.lista.map((a,i)=>`
      <div class="alert-card">
        <div class="ic" style="background:${ALERT_COLOR[i]}22">${ALERT_ICON[i]}</div>
        <div style="flex:1">
          <div class="alert-top"><div class="title" style="font-weight:600">${a.tipo}</div>
            <span class="pill" style="background:${ALERT_COLOR[i]}22;color:${ALERT_COLOR[i]}">${T_.niveis[a.nivel]}</span></div>
          <div class="alert-meta"><span>📍 ${a.regiao}</span><span>· ${a.janela}</span></div>
        </div>
      </div>`).join("")}
  </div>`;
}

function renderDados(){
  const T_ = t().dados;
  return `
  <div class="eyebrow">${T_.eyebrow}</div>
  <h2 class="page-title">${T_.titulo}</h2>
  <p class="page-sub">${T_.sub}</p>
  <div class="dados-grid">
    <div class="chart-card"><div class="ctitle">${T_.chart1}</div><canvas id="chart1" height="200"></canvas></div>
    <div class="chart-card"><div class="ctitle">${T_.chart2}</div><canvas id="chart2" height="200"></canvas></div>
    <div class="chart-card span2"><div class="ctitle">${T_.chart3}</div><canvas id="chart3" height="160"></canvas></div>
  </div>`;
}
let chartInstances = [];
function drawCharts(){
  if(typeof Chart==="undefined") return;
  chartInstances.forEach(c=>c.destroy()); chartInstances=[];
  const T_ = t().dados;
  const c1 = document.getElementById('chart1');
  if(c1) chartInstances.push(new Chart(c1,{type:'line',data:{labels:T_.meses,datasets:[{data:PRODUCAO_VAL,borderColor:'#0077D4',backgroundColor:'#0077D422',tension:.35,fill:true}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:false}}}}));
  const c2 = document.getElementById('chart2');
  if(c2) chartInstances.push(new Chart(c2,{type:'bar',data:{labels:T_.anos,datasets:[{data:RENDA_VAL,backgroundColor:'#00579B',borderRadius:6}]},options:{plugins:{legend:{display:false}}}}));
  const c3 = document.getElementById('chart3');
  if(c3) chartInstances.push(new Chart(c3,{type:'pie',data:{labels:T_.antesDepois,datasets:[{data:PERDAS_VAL,backgroundColor:PERDA_COLOR}]},options:{plugins:{legend:{position:'bottom'}}}}));
}

/* ======================= APP ROOT ======================= */
function render(){
  const T_ = t();
  let body="";
  if(state.page==="inicio") body = renderInicio();
  else if(state.page==="mercado") body = renderMercado();
  else if(state.page==="assistente") body = renderAssistente();
  else if(state.page==="formacao") body = renderFormacao();
  else if(state.page==="alertas") body = renderAlertas();
  else if(state.page==="dados") body = renderDados();

  document.getElementById("app").innerHTML = `
    ${renderHeader()}
    <main>${body}</main>
    <footer>${T_.footer}</footer>
  `;
  document.documentElement.lang = state.lang;
  if(state.page==="dados") setTimeout(drawCharts, 30);
  const chatBox = document.getElementById('chat-box');
  if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
}

document.addEventListener("click",(e)=>{
  if(!e.target.closest(".lang-wrap") && state.langMenuOpen){ state.langMenuOpen=false; render(); }
});

render();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
